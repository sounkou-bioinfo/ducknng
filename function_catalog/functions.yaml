      ]
    },
    {
      "name": "ducknng_list_tls_configs",
      "kind": "table",
      "category": "Transport Security",
      "signature": "ducknng_list_tls_configs()",
      "returns": "TABLE(tls_config_id UBIGINT, source VARCHAR, enabled BOOLEAN, has_cert_key_file BOOLEAN, has_ca_file BOOLEAN, has_cert_pem BOOLEAN, has_key_pem BOOLEAN, has_ca_pem BOOLEAN, has_password BOOLEAN, auth_mode INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered TLS config handles and the kinds of material they contain.",
      "notes": [
        "This is runtime introspection only and does not expose the sensitive PEM content itself."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_tls_configs();"
      ]
    },
    {
      "name": "ducknng_drop_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_drop_tls_config(tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Remove a registered TLS config handle from the runtime.",
      "notes": [],
      "examples": [
        "SELECT ducknng_drop_tls_config(1);"
      ]
    },
    {
      "name": "ducknng_self_signed_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_self_signed_tls_config(common_name, valid_days, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Generate a self-signed development certificate and register it as a TLS config handle.",
      "notes": [
        "Intended for development and local testing utilities rather than production PKI.",
        "Uses the openssl command-line tool available in the runtime environment."
      ],
      "examples": [
        "SELECT ducknng_self_signed_tls_config('127.0.0.1', 365, 1);"
      ]
    },
    {
      "name": "ducknng_tls_config_from_pem",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_tls_config_from_pem(cert_pem, key_pem, ca_pem, password, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a TLS config handle from in-memory PEM material.",
      "notes": [
        "Stores PEM material in the runtime and returns a reusable config id.",
        "Can be used with tls+tcp listeners and the one-shot raw request path."
      ],
      "examples": [
        "SELECT ducknng_tls_config_from_pem('-----BEGIN CERTIFICATE-----\n...','-----BEGIN PRIVATE KEY-----\n...', '-----BEGIN CERTIFICATE-----\n...', NULL, 1);"
      ]
    },
    {
      "name": "ducknng_tls_config_from_files",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_tls_config_from_files(cert_key_file, ca_file, password, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a TLS config handle from file-backed certificate material.",
      "notes": [
        "Stores TLS material references in the runtime and returns a reusable config id.",
        "Can be used with tls+tcp listeners and the one-shot raw request path."
      ],
      "examples": [
        "SELECT ducknng_tls_config_from_files('/tmp/server.pem', '/tmp/ca.pem', NULL, 1);"
      ]
    },
    {
      "name": "ducknng_request",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_request(url, payload, timeout_ms, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, payload BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a one-shot raw request and return a structured result row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is the preferred low-level primitive for one-shot req/rep from SQL.",
        "Use ducknng_request_raw() only when a bare BLOB return is specifically needed."
      ],
      "examples": [
        "SELECT * FROM ducknng_request('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_request_socket",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_request_socket(socket_id, payload, timeout_ms)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, payload BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a raw request through a previously dialed socket handle and return a structured result row.",
      "notes": [
        "This is the preferred low-level primitive when reusing a socket handle.",
        "Use ducknng_request_socket_raw() only when a bare BLOB return is specifically needed."
      ],
      "examples": [
        "SELECT * FROM ducknng_request_socket(1::UBIGINT, from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_request_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_request_raw_aio(url, frame, timeout_ms, tls_config_id)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one raw req/rep roundtrip asynchronously and return a future-like aio handle id.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "The returned handle represents one pending request operation backed by NNG aio state.",
        "Use ducknng_aio_collect() to retrieve the full reply frame later."
      ],
      "examples": [
        "SELECT ducknng_request_raw_aio('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_request_socket_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_request_socket_raw_aio(socket_id, frame, timeout_ms)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one raw req/rep roundtrip asynchronously on an existing socket handle and return an aio handle id.",
      "notes": [
        "The socket must already be opened, dialed, and connected.",
        "Use ducknng_aio_collect() to retrieve the full reply frame later."
      ],
      "examples": [
        "SELECT ducknng_request_socket_raw_aio(1::UBIGINT, from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_aio_ready",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_aio_ready(aio_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Return whether an aio handle has reached a terminal state.",
      "notes": [
        "Returns FALSE for unknown handles and for pending operations.",
        "A collected handle remains ready until it is dropped."
      ],
      "examples": [
        "SELECT ducknng_aio_ready(1::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_aio_collect",
      "kind": "table",
      "category": "Async I/O",
      "signature": "ducknng_aio_collect(aio_ids, wait_ms)",
      "returns": "TABLE(aio_id UBIGINT, ok BOOLEAN, error VARCHAR, frame BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Wait for any requested aio handles to finish and return one row per newly collected terminal result.",
      "notes": [
        "Pass a LIST<UBIGINT> of aio handle ids, for example list_value(aio1, aio2).",
        "Dynamic list expressions are supported through the SQL macro wrapper, including scalar subqueries that produce one list value.",
        "wait_ms = 0 performs a pure poll.",
        "frame contains the full reply frame when transport-level request/reply succeeded; decode it with ducknng_decode_frame()."
      ],
      "examples": [
        "SELECT * FROM ducknng_aio_collect(list_value(1::UBIGINT, 2::UBIGINT), 1000);"
      ]
    },
    {
      "name": "ducknng_aio_cancel",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_aio_cancel(aio_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Request cancellation of a pending aio handle.",
      "notes": [
        "Returns FALSE for unknown handles and for handles that are no longer pending."
      ],
      "examples": [
        "SELECT ducknng_aio_cancel(1::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_aio_drop",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_aio_drop(aio_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Release a terminal aio handle from the runtime registry.",
      "notes": [
        "Returns FALSE for unknown handles and for still-pending handles.",
        "Collected handles should be dropped explicitly because SQL has no destructors."
      ],
      "examples": [
        "SELECT ducknng_aio_drop(1::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_get_rpc_manifest",
      "kind": "table",
      "category": "RPC Helper",
      "signature": "ducknng_get_rpc_manifest(url, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, manifest VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Request the RPC manifest and return a structured result row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "Built on top of the primitive request layer and ducknng RPC envelope."
      ],
      "examples": [
        "SELECT * FROM ducknng_get_rpc_manifest('ipc:///tmp/ducknng_sql0.ipc', 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_get_rpc_manifest_raw",
      "kind": "scalar",
      "category": "RPC Helper",
      "signature": "ducknng_get_rpc_manifest_raw(url, tls_config_id)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Request the RPC manifest and return the raw reply frame as BLOB.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is a raw helper: it returns the full reply frame and yields NULL on local request failure.",
        "Use ducknng_decode_frame() to inspect the envelope and payload from SQL."
      ],
      "examples": [
        "SELECT ok, type_name, name, payload_text FROM ducknng_decode_frame(ducknng_get_rpc_manifest_raw('ipc:///tmp/ducknng_sql0.ipc', 0::UBIGINT));"
      ]
    },
    {
      "name": "ducknng_run_rpc",
      "kind": "table",
      "category": "RPC Helper",
      "signature": "ducknng_run_rpc(url, sql, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, rows_changed UBIGINT, statement_type INTEGER, result_type INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute a metadata-oriented RPC call and return a structured result row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "These helpers require the remote server to have explicitly registered the exec method."
      ],
      "examples": [
        "SELECT * FROM ducknng_run_rpc('ipc:///tmp/ducknng_sql0.ipc', 'CREATE TABLE t(i INTEGER)', 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_run_rpc_raw",
      "kind": "scalar",
      "category": "RPC Helper",
      "signature": "ducknng_run_rpc_raw(url, sql, tls_config_id)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute the exec RPC and return the raw reply frame as BLOB.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is a raw helper: it returns the full reply frame and yields NULL on local request failure.",
        "Use ducknng_decode_frame() or a payload-specific decoder after inspection.",
        "These helpers require the remote server to have explicitly registered the exec method."
      ],
      "examples": [
        "SELECT ok, type_name, name FROM ducknng_decode_frame(ducknng_run_rpc_raw('ipc:///tmp/ducknng_sql0.ipc', 'CREATE TABLE t(i INTEGER)', 0::UBIGINT));"
      ]
    },
    {
      "name": "ducknng_query_rpc",
      "kind": "table",
      "category": "RPC Helper",
      "signature": "ducknng_query_rpc(url, sql, tls_config_id)",
      "returns": "table",
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute a row-returning RPC query and expose the unary Arrow IPC row reply as a DuckDB table.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is the current unary row path, not the future session streaming path.",
        "These helpers require the remote server to have explicitly registered the exec method."
      ],
      "examples": [
        "SELECT * FROM ducknng_query_rpc('ipc:///tmp/ducknng_sql0.ipc', 'SELECT 42 AS answer', 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_open_query",
      "kind": "table",
      "category": "RPC Session",
      "signature": "ducknng_open_query(url, sql, batch_rows, batch_bytes, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, session_id UBIGINT, state VARCHAR, next_method VARCHAR, control_json VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Open a server-side query session and return the JSON control metadata as a structured row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "batch_rows and batch_bytes are optional fetch-hint fields carried in the query_open payload.",
        "This surface is still development scaffolding until session ownership is bound to a real client identity model."
      ],
      "examples": [
        "SELECT * FROM ducknng_open_query('ipc:///tmp/ducknng_sql0.ipc', 'SELECT 42 AS answer', 0::UBIGINT, 0::UBIGINT, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_fetch_query",
      "kind": "table",
      "category": "RPC Session",
      "signature": "ducknng_fetch_query(url, session_id, batch_rows, batch_bytes, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, session_id UBIGINT, state VARCHAR, next_method VARCHAR, control_json VARCHAR, payload BLOB, end_of_stream BOOLEAN)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Fetch the next session reply and return either JSON control metadata or an Arrow IPC batch payload.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "When a row batch is returned, payload contains one Arrow IPC batch and control_json is NULL.",
        "When the session is exhausted, payload is NULL, state is usually exhausted, and end_of_stream is TRUE."
      ],
      "examples": [
        "SELECT * FROM ducknng_fetch_query('ipc:///tmp/ducknng_sql0.ipc', 1::UBIGINT, 0::UBIGINT, 0::UBIGINT, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_close_query",
      "kind": "table",
      "category": "RPC Session",
      "signature": "ducknng_close_query(url, session_id, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, session_id UBIGINT, state VARCHAR, next_method VARCHAR, control_json VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Close a server-side query session and return the JSON control metadata as a structured row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is the normal explicit cleanup path after fetch reaches end-of-stream."
      ],
      "examples": [
        "SELECT * FROM ducknng_close_query('ipc:///tmp/ducknng_sql0.ipc', 1::UBIGINT, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_cancel_query",
      "kind": "table",
      "category": "RPC Session",
      "signature": "ducknng_cancel_query(url, session_id, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, session_id UBIGINT, state VARCHAR, next_method VARCHAR, control_json VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Cancel and close a server-side query session and return the JSON control metadata as a structured row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is best-effort cancellation and still part of the development session surface."
      ],
      "examples": [
        "SELECT * FROM ducknng_cancel_query('ipc:///tmp/ducknng_sql0.ipc', 1::UBIGINT, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_request_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_request_raw(url, payload, timeout_ms, tls_config_id)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a one-shot raw request and return the raw reply frame bytes.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "Returns NULL on local request failure instead of throwing.",
        "Use ducknng_decode_frame() to inspect the envelope and textual payload from SQL."
      ],
      "examples": [
        "SELECT hex(ducknng_request_raw('ipc:///tmp/ducknng_sql0.ipc', from_hex('0100'), 1000, 0::UBIGINT));"
      ]
    },
    {
      "name": "ducknng_request_socket_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_request_socket_raw(socket_id, payload, timeout_ms)",
      "returns": "BLOB",

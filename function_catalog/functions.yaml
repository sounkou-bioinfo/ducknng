{
  "functions": [
    {
      "name": "ducknng_start_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_start_server(name, listen, contexts, recv_max_bytes, session_idle_ms, tls_config_id[, ip_allowlist_json])",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Start a named ducknng NNG listener.",
      "notes": [
        "Transport is selected by the NNG listen URL scheme. Supported listener schemes now include inproc://, ipc://, tcp://, tls+tcp://, ws://, and wss://.",
        "Use ducknng_tls_config_from_files(), ducknng_tls_config_from_pem(), or ducknng_self_signed_tls_config() to create a reusable TLS handle for tls+tcp:// and wss:// listeners.",
        "Optional ip_allowlist_json is a JSON array of IPv4/IPv6 literals or CIDR blocks copied into the service before it starts.",
        "For network-exposed services, prefer TLS/mTLS and use IP allowlists as an additional or proxy-friendly admission layer."
      ],
      "examples": [
        "SELECT ducknng_start_server('sql0', 'ipc:///tmp/ducknng_sql0.ipc', 1, 134217728, 300000, 0);"
      ]
    },
    {
      "name": "ducknng_start_http_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_start_http_server(name, listen, recv_max_bytes, session_idle_ms, tls_config_id[, ip_allowlist_json])",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Start a named ducknng HTTP or HTTPS frame carrier.",
      "notes": [
        "listen must be an http:// or https:// URL whose path becomes the mounted RPC endpoint.",
        "Use ducknng_tls_config_from_files(), ducknng_tls_config_from_pem(), or ducknng_self_signed_tls_config() to create a reusable TLS handle for https:// listeners.",
        "Optional ip_allowlist_json is a JSON array of IPv4/IPv6 literals or CIDR blocks checked before HTTP framed-RPC dispatch.",
        "For public HTTP-style deployments, prefer https:// directly or a reverse proxy/firewall enforcing IP/CIDR policy before loopback http://."
      ],
      "examples": [
        "SELECT ducknng_start_http_server('http0', 'http://127.0.0.1:8080/_ducknng', 134217728, 300000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_stop_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_stop_server(name)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Stop a named ducknng service.",
      "notes": [],
      "examples": [
        "SELECT ducknng_stop_server('sql0');"
      ]
    },
    {
      "name": "ducknng_list_servers",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_list_servers()",
      "returns": "TABLE(service_id UBIGINT, name VARCHAR, listen VARCHAR, contexts INTEGER, running BOOLEAN, sessions UBIGINT, active_pipes UBIGINT, max_open_sessions UBIGINT, max_active_pipes UBIGINT, inflight_requests UBIGINT, max_inflight_requests UBIGINT, max_sessions_per_peer_identity UBIGINT, tls_enabled BOOLEAN, tls_auth_mode INTEGER, peer_identity_required BOOLEAN, peer_allowlist_active BOOLEAN, ip_allowlist_active BOOLEAN, sql_authorizer_active BOOLEAN, peer_allowlist_count UBIGINT, ip_allowlist_count UBIGINT)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered ducknng services.",
      "notes": [
        "tls_auth_mode follows the TLS config handle: 0 = no peer authentication, 1 = optional peer verification, 2 = required peer verification/mTLS.",
        "peer_identity_required is true when the service requires a verified transport-derived peer identity before dispatch.",
        "peer_allowlist_active reports whether service-level peer admission uses an exact verified-identity allowlist.",
        "peer_allowlist_count reports the number of admitted identities; an active allowlist with count 0 denies every verified peer.",
        "ip_allowlist_active reports whether service-level remote-address admission uses an IP/CIDR allowlist.",
        "ip_allowlist_count reports the number of configured IP/CIDR rules; an active allowlist with count 0 denies every remote address.",
        "sql_authorizer_active reports whether a service-level SQL authorization callback is installed.",
        "max_open_sessions is 0 for unlimited; non-zero values are enforced before query_open registers a new session.",
        "active_pipes counts currently active NNG protocol-socket pipes for the service; HTTP/HTTPS carrier connections are not NNG pipes.",
        "max_active_pipes is 0 for unlimited; non-zero values are enforced at NNG ADD_PRE pipe admission.",
        "inflight_requests counts requests currently inside the service request boundary.",
        "max_inflight_requests is 0 for unlimited; non-zero values are enforced before SQL authorizers and RPC dispatch.",
        "max_sessions_per_peer_identity is 0 for unlimited; non-zero values cap concurrent query sessions for each verified peer identity."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_servers();"
      ]
    },
    {
      "name": "ducknng_register_exec_method",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_register_exec_method([requires_auth])",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register the built-in exec RPC method explicitly.",
      "notes": [
        "exec is not registered by default. Call this deliberately before exposing SQL execution over RPC.",
        "requires_auth defaults to false for backwards compatibility. Pass true to require a verified transport-derived peer identity for exec dispatch.",
        "Listener TLS authentication mode 2 still requires verified peer identity for every method, independent of this per-method setting."
      ],
      "examples": [
        "SELECT ducknng_register_exec_method();",
        "SELECT ducknng_register_exec_method(true);"
      ]
    },
    {
      "name": "ducknng_set_method_auth",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_set_method_auth(name, requires_auth)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Set descriptor-level verified-peer-identity authorization for a registered RPC method.",
      "notes": [
        "This updates the registry descriptor used by dispatch and manifest generation.",
        "Use ducknng_set_method_auth('manifest', true) to require verified peer identity for manifest discovery unless a stronger listener-wide auth_mode already applies.",
        "Registry administration functions are local SQL functions; this controls remote RPC method dispatch."
      ],
      "examples": [
        "SELECT ducknng_set_method_auth('manifest', true);",
        "SELECT name, requires_auth FROM ducknng_list_methods() WHERE name = 'manifest';"
      ]
    },
    {
      "name": "ducknng_unregister_method",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_unregister_method(name)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Unregister a method from the runtime registry.",
      "notes": [
        "The built-in manifest method cannot be unregistered.",
        "Sessionful methods cannot be unregistered while any service has open sessions."
      ],
      "examples": [
        "SELECT ducknng_unregister_method('exec');"
      ]
    },
    {
      "name": "ducknng_unregister_family",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_unregister_family(family)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Unregister all methods in a family and return the number removed.",
      "notes": [
        "The built-in control family cannot be unregistered.",
        "Sessionful method families cannot be unregistered while any service has open sessions."
      ],
      "examples": [
        "SELECT ducknng_unregister_family('sql');"
      ]
    },
    {
      "name": "ducknng_list_methods",
      "kind": "table",
      "category": "Method Registry",
      "signature": "ducknng_list_methods()",
      "returns": "TABLE(name VARCHAR, family VARCHAR, summary VARCHAR, transport_pattern VARCHAR, request_payload_format VARCHAR, response_payload_format VARCHAR, response_mode VARCHAR, request_schema_json VARCHAR, response_schema_json VARCHAR, requires_auth BOOLEAN, disabled BOOLEAN)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List the currently registered RPC methods in the runtime registry.",
      "notes": [
        "Use this to verify whether exec has been explicitly enabled."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_methods();"
      ]
    },
    {
      "name": "ducknng_read_monitor",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_read_monitor(name, after_seq, max_events)",
      "returns": "TABLE(seq UBIGINT, ts_ms UBIGINT, pipe_id UBIGINT, service_name VARCHAR, listen VARCHAR, transport_family VARCHAR, scheme VARCHAR, event VARCHAR, admitted BOOLEAN, reason VARCHAR, remote_addr VARCHAR, remote_ip VARCHAR, remote_port INTEGER, peer_identity VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Read the bounded per-service NNG pipe monitor event stream.",
      "notes": [
        "Events currently cover NNG transports using nng_pipe_notify ADD_PRE, ADD_POST, and REM_POST callbacks.",
        "after_seq returns only events with seq greater than the supplied value; max_events = 0 means no explicit caller cap beyond the service ring buffer.",
        "admitted is populated for ADD_PRE admission decisions and NULL for post-add/remove notifications.",
        "The stream is a bounded in-memory ring intended as a foundation for telemetry, admission audit, mesh membership, routing, and forwarding demos.",
        "reason is populated for denied ADD_PRE events when the fast C admission path has a stable reason."
      ],
      "examples": [
        "SELECT * FROM ducknng_read_monitor('svc', 0::UBIGINT, 100::UBIGINT) ORDER BY seq;"
      ]
    },
    {
      "name": "ducknng_monitor_status",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_monitor_status(name)",
      "returns": "TABLE(service_name VARCHAR, event_capacity UBIGINT, event_count UBIGINT, oldest_seq UBIGINT, newest_seq UBIGINT, dropped_events UBIGINT, active_pipes UBIGINT, max_active_pipes UBIGINT)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Return pipe monitor ring status and active-pipe counters for a running service.",
      "notes": [
        "event_capacity is the bounded in-memory pipe-event ring capacity.",
        "dropped_events counts overwritten pipe events since the service started.",
        "active_pipes counts current NNG protocol-socket pipes; HTTP/HTTPS carrier connections are not NNG pipes."
      ],
      "examples": [
        "SELECT * FROM ducknng_monitor_status('svc');"
      ]
    },
    {
      "name": "ducknng_list_pipes",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_list_pipes(name)",
      "returns": "TABLE(pipe_id UBIGINT, opened_ms UBIGINT, service_name VARCHAR, listen VARCHAR, transport_family VARCHAR, scheme VARCHAR, remote_addr VARCHAR, remote_ip VARCHAR, remote_port INTEGER, peer_identity VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List currently active NNG pipes for a running service.",
      "notes": [
        "Active pipe state is maintained from NNG ADD_POST and REM_POST pipe notifications.",
        "HTTP/HTTPS framed RPC carrier connections are not NNG protocol-socket pipes and are not listed here.",
        "This table is useful as a mesh/routing foundation alongside ducknng_read_monitor()."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_pipes('svc');"
      ]
    },
    {
      "name": "ducknng_open_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_open_socket(protocol)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Open a client socket handle for a supported NNG protocol.",
      "notes": [
        "Supported protocols now follow the nanonext-facing model: bus, pair, pair0, pair1, poly, push, pull, pub, sub, req, rep, surveyor, and respondent.",
        "pair is the nanonext-compatible alias for pair0, and poly opens pair1 in polyamorous mode.",
        "request-oriented helpers such as ducknng_request_socket_raw() still require a req socket."
      ],
      "examples": [
        "SELECT ducknng_open_socket('req');",
        "SELECT ducknng_open_socket('pair');",
        "SELECT ducknng_open_socket('surveyor');"
      ]
    },
    {
      "name": "ducknng_dial_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_dial_socket(socket_id, url, timeout_ms, tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Dial a URL using an opened socket handle.",
      "notes": [
        "Transport is selected by the URL scheme.",
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp:// and wss:// dial targets.",
        "This is the generic dial verb for the supported socket protocols."
      ],
      "examples": [
        "SELECT ducknng_dial_socket(ducknng_open_socket('req'), 'ipc:///tmp/ducknng_sql0.ipc', 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_listen_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_listen_socket(socket_id, url, recv_max_bytes, tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Bind a socket handle to a listen URL and start its NNG listener.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext URLs or a registered TLS handle for tls+tcp:// and wss:// listeners.",
        "Use this for the generic socket surface rather than the RPC service lifecycle surface."
      ],
      "examples": [
        "SELECT ducknng_listen_socket(ducknng_open_socket('pair'), 'ipc:///tmp/ducknng_pair.ipc', 134217728, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_close_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_close_socket(socket_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Close a client socket handle.",
      "notes": [],
      "examples": [
        "SELECT ducknng_close_socket(1);"
      ]
    },
    {
      "name": "ducknng_send_socket_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_send_socket_raw(socket_id, frame, timeout_ms)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Send one raw frame through an active socket handle.",
      "notes": [
        "This is the raw socket-level send primitive modeled on nanonext send(..., mode = 'raw').",
        "A TRUE result means the send operation completed successfully at the NNG socket layer."
      ],
      "examples": [
        "SELECT ducknng_send_socket_raw(1::UBIGINT, from_hex('68656c6c6f'), 1000);"
      ]
    },
    {
      "name": "ducknng_recv_socket_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_recv_socket_raw(socket_id, timeout_ms)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Receive one raw frame from an active socket handle.",
      "notes": [
        "This is the raw socket-level receive primitive modeled on nanonext recv(..., mode = 'raw')."
      ],
      "examples": [
        "SELECT hex(ducknng_recv_socket_raw(1::UBIGINT, 1000));"
      ]
    },
    {
      "name": "ducknng_subscribe_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_subscribe_socket(socket_id, topic)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a raw topic prefix on a sub socket.",
      "notes": [
        "Pass from_hex('') to subscribe to all topics.",
        "This is only valid for sockets opened with protocol = 'sub'."
      ],
      "examples": [
        "SELECT ducknng_subscribe_socket(1::UBIGINT, from_hex(''));"
      ]
    },
    {
      "name": "ducknng_unsubscribe_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_unsubscribe_socket(socket_id, topic)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Remove a raw topic prefix from a sub socket.",
      "notes": [
        "Pass from_hex('') to remove the all-topics subscription.",
        "This is only valid for sockets opened with protocol = 'sub'."
      ],
      "examples": [
        "SELECT ducknng_unsubscribe_socket(1::UBIGINT, from_hex(''));"
      ]
    },
    {
      "name": "ducknng_list_sockets",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_list_sockets()",
      "returns": "TABLE(socket_id UBIGINT, protocol VARCHAR, url VARCHAR, open BOOLEAN, connected BOOLEAN, listening BOOLEAN, send_timeout_ms INTEGER, recv_timeout_ms INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List client socket handles in the runtime.",
      "notes": [
        "url reports the current dial URL or listen URL tracked on the socket handle.",
        "Primitive transport introspection."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_sockets();"
      ]
    },
    {
      "name": "ducknng_list_tls_configs",
      "kind": "table",
      "category": "Transport Security",
      "signature": "ducknng_list_tls_configs()",
      "returns": "TABLE(tls_config_id UBIGINT, source VARCHAR, enabled BOOLEAN, has_cert_key_file BOOLEAN, has_ca_file BOOLEAN, has_cert_pem BOOLEAN, has_key_pem BOOLEAN, has_ca_pem BOOLEAN, has_password BOOLEAN, auth_mode INTEGER, peer_allowlist_active BOOLEAN, peer_allowlist_count UBIGINT, peer_allowlist_json VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered TLS config handles and the kinds of material they contain.",
      "notes": [
        "This is runtime introspection only and does not expose the sensitive PEM content itself.",
        "peer_allowlist_json contains only configured identity strings, not certificate material or private keys."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_tls_configs();"
      ]
    },
    {
      "name": "ducknng_drop_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_drop_tls_config(tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Remove a registered TLS config handle from the runtime.",
      "notes": [],
      "examples": [
        "SELECT ducknng_drop_tls_config(1);"
      ]
    },
    {
      "name": "ducknng_set_tls_peer_allowlist",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_set_tls_peer_allowlist(tls_config_id, identities_json)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Set the default exact peer-identity allowlist on a TLS config handle.",
      "notes": [
        "identities_json must be a JSON array of exact verified peer identity strings such as [\"tls:san:client-a.example\"].",
        "Services copy this policy from the TLS config at start time; use ducknng_set_service_peer_allowlist() to update a running service dynamically.",
        "NULL or an empty string clears the allowlist and returns to default-open admission for that handle.",
        "An empty JSON array [] is an active deny-all allowlist."
      ],
      "examples": [
        "SELECT ducknng_set_tls_peer_allowlist(1::UBIGINT, '[\"tls:san:client-a.example\"]');"
      ]
    },
    {
      "name": "ducknng_set_service_peer_allowlist",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_set_service_peer_allowlist(name, identities_json)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Dynamically set the exact peer-identity allowlist for a running service.",
      "notes": [
        "identities_json must be a JSON array of exact verified peer identity strings such as [\"tls:san:client-a.example\"].",
        "NULL or an empty string clears the allowlist and returns the service to default-open admission subject to its TLS auth_mode and method policy.",
        "An empty JSON array [] is an active deny-all allowlist.",
        "For NNG transports, new pipes are closed during the NNG ADD_PRE pipe notification when the verified identity is not admitted; dispatch also re-checks the policy for existing pipes.",
        "For the HTTP/HTTPS carrier, unauthorized requests receive HTTP 403 before RPC dispatch."
      ],
      "examples": [
        "SELECT ducknng_set_service_peer_allowlist('svc', '[\"tls:san:client-a.example\"]');"
      ]
    },
    {
      "name": "ducknng_set_service_ip_allowlist",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_set_service_ip_allowlist(name, cidrs_json)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Dynamically set the IP/CIDR remote-address allowlist for a running service.",
      "notes": [
        "cidrs_json must be a JSON array of IPv4/IPv6 literals or CIDR blocks such as [\"127.0.0.1/32\", \"10.0.0.0/8\", \"::1/128\"].",
        "NULL or an empty string clears the allowlist and returns the service to default-open remote-address admission subject to other TLS/method/session policy.",
        "An empty JSON array [] is an active deny-all IP allowlist.",
        "For NNG transports, new pipes are checked using NNG_OPT_REMADDR during the ADD_PRE pipe notification; dispatch also re-checks the policy for existing pipes.",
        "For HTTP/HTTPS, non-admitted remote addresses receive HTTP 403 before RPC dispatch."
      ],
      "examples": [
        "SELECT ducknng_set_service_ip_allowlist('svc', '[\"127.0.0.1/32\",\"10.0.0.0/8\"]');"
      ]
    },
    {
      "name": "ducknng_set_service_limits",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_set_service_limits(name, max_open_sessions[, max_active_pipes[, max_inflight_requests[, max_sessions_per_peer_identity]]])",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Set service resource limits.",
      "notes": [
        "max_open_sessions limits concurrently open query sessions for the service.",
        "A value of 0 clears the limit and means unlimited for this first limit surface.",
        "When the limit is exceeded, query_open fails with ducknng: max open sessions exceeded.",
        "Current built-in quota owners are the service itself and, for max_sessions_per_peer_identity, the verified TLS peer identity. SQL-authorizer principal values are deployment policy/audit metadata, not built-in quota owners yet.",
        "Future additive service limits may include principal-based caps, byte budgets, and rate limits.",
        "max_active_pipes limits simultaneously active NNG protocol-socket pipes for the service; 0 means unlimited.",
        "The two-argument form preserves the current max_active_pipes value.",
        "max_inflight_requests limits concurrent requests inside the service request boundary; 0 means unlimited.",
        "The three-argument form preserves the current max_inflight_requests value.",
        "max_sessions_per_peer_identity limits concurrently open query sessions for each verified TLS peer identity; 0 means unlimited.",
        "The four-argument form preserves the current max_sessions_per_peer_identity value."
      ],
      "examples": [
        "SELECT ducknng_set_service_limits('svc', 16::UBIGINT);",
        "SELECT ducknng_set_service_limits('svc', 16::UBIGINT, 128::UBIGINT);",
        "SELECT ducknng_set_service_limits('svc', 16::UBIGINT, 128::UBIGINT, 8::UBIGINT);",
        "SELECT ducknng_set_service_limits('svc', 16::UBIGINT, 128::UBIGINT, 8::UBIGINT, 2::UBIGINT);"
      ],
      "parameters": "name, max_open_sessions[, max_active_pipes[, max_inflight_requests[, max_sessions_per_peer_identity]]]"
    },
    {
      "name": "ducknng_auth_context",
      "kind": "table",
      "category": "Transport Security",
      "signature": "ducknng_auth_context()",
      "returns": "TABLE(phase VARCHAR, service_name VARCHAR, transport_family VARCHAR, scheme VARCHAR, listen VARCHAR, remote_addr VARCHAR, remote_ip VARCHAR, remote_port INTEGER, tls_verified BOOLEAN, peer_identity VARCHAR, peer_allowlist_active BOOLEAN, ip_allowlist_active BOOLEAN, sql_authorizer_active BOOLEAN, http_method VARCHAR, http_path VARCHAR, content_type VARCHAR, body_bytes UBIGINT, rpc_method VARCHAR, rpc_type VARCHAR, payload_bytes UBIGINT)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Expose the current request context to a SQL authorization callback.",
      "notes": [
        "Returns one row only while a ducknng SQL authorizer is running; outside that callback it returns zero rows.",
        "The same context shape is used for NNG and HTTP/HTTPS framed RPC carriers where metadata is available.",
        "Bearer session tokens are intentionally not exposed in this context table."
      ],

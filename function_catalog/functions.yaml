{
  "functions": [
    {
      "name": "ducknng_start_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_start_server(name, listen, contexts, recv_max_bytes, session_idle_ms, tls_cert_key_file, tls_ca_file, tls_auth_mode)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Start a named ducknng REP listener.",
      "notes": [],
      "examples": [
        "SELECT ducknng_start_server('sql0', 'ipc:///tmp/ducknng_sql0.ipc', 1, 134217728, 300000, NULL, NULL, NULL);"
      ]
    },
    {
      "name": "ducknng_stop_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_stop_server(name)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Stop a named ducknng service.",
      "notes": [],
      "examples": [
        "SELECT ducknng_stop_server('sql0');"
      ]
    },
    {
      "name": "ducknng_list_servers",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_list_servers()",
      "returns": "TABLE(service_id UBIGINT, name VARCHAR, listen VARCHAR, contexts INTEGER, running BOOLEAN, sessions UBIGINT)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered ducknng services.",
      "notes": [],
      "examples": [
        "SELECT * FROM ducknng_list_servers();"
      ]
    },
    {
      "name": "ducknng_open_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_open_socket(protocol)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Open a client socket handle for a supported protocol.",
      "notes": [
        "This is the primitive transport entry point. Currently only req is implemented."
      ],
      "examples": [
        "SELECT ducknng_open_socket('req');"
      ]
    },
    {
      "name": "ducknng_dial_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_dial_socket(socket_id, url, timeout_ms)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Dial a URL using an opened socket handle.",
      "notes": [
        "Preferred primitive transport verb."
      ],
      "examples": [
        "SELECT ducknng_dial_socket(ducknng_open_socket('req'), 'ipc:///tmp/ducknng_sql0.ipc', 1000);"
      ]
    },
    {
      "name": "ducknng_close_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_close_socket(socket_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Close a client socket handle.",
      "notes": [],
      "examples": [
        "SELECT ducknng_close_socket(1);"
      ]
    },
    {
      "name": "ducknng_list_sockets",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_list_sockets()",
      "returns": "TABLE(socket_id UBIGINT, protocol VARCHAR, url VARCHAR, open BOOLEAN, connected BOOLEAN, send_timeout_ms INTEGER, recv_timeout_ms INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List client socket handles in the runtime.",
      "notes": [
        "Primitive transport introspection."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_sockets();"
      ]
    },
    {
      "name": "ducknng_list_tls_configs",
      "kind": "table",
      "category": "Transport Security",
      "signature": "ducknng_list_tls_configs()",
      "returns": "TABLE(tls_config_id UBIGINT, source VARCHAR, enabled BOOLEAN, has_cert_key_file BOOLEAN, has_ca_file BOOLEAN, has_cert_pem BOOLEAN, has_key_pem BOOLEAN, has_ca_pem BOOLEAN, has_password BOOLEAN, auth_mode INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered TLS config handles and the kinds of material they contain.",
      "notes": [
        "This is runtime introspection only and does not expose the sensitive PEM content itself."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_tls_configs();"
      ]
    },
    {
      "name": "ducknng_drop_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_drop_tls_config(tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Remove a registered TLS config handle from the runtime.",
      "notes": [],
      "examples": [
        "SELECT ducknng_drop_tls_config(1);"
      ]
    },
    {
      "name": "ducknng_self_signed_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_self_signed_tls_config(common_name, valid_days, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Generate a self-signed development certificate and register it as a TLS config handle.",
      "notes": [
        "Intended for development and local testing utilities rather than production PKI.",
        "Uses the openssl command-line tool available in the runtime environment."
      ],
      "examples": [
        "SELECT ducknng_self_signed_tls_config('127.0.0.1', 365, 1);"
      ]
    },
    {
      "name": "ducknng_tls_config_from_pem",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_tls_config_from_pem(cert_pem, key_pem, ca_pem, password, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a TLS config handle from in-memory PEM material.",
      "notes": [
        "Stores PEM material in the runtime and returns a reusable config id.",
        "Can be used with tls+tcp listeners and the one-shot raw request path."
      ],
      "examples": [
        "SELECT ducknng_tls_config_from_pem('-----BEGIN CERTIFICATE-----\n...','-----BEGIN PRIVATE KEY-----\n...', '-----BEGIN CERTIFICATE-----\n...', NULL, 1);"
      ]
    },
    {
      "name": "ducknng_tls_config_from_files",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_tls_config_from_files(cert_key_file, ca_file, password, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a TLS config handle from file-backed certificate material.",
      "notes": [
        "Stores TLS material references in the runtime and returns a reusable config id.",
        "Can be used with tls+tcp listeners and the one-shot raw request path."
      ],
      "examples": [
        "SELECT ducknng_tls_config_from_files('/tmp/server.pem', '/tmp/ca.pem', NULL, 1);"
      ]
    },
    {
      "name": "ducknng_request",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_request(url, payload, timeout_ms)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, payload BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a one-shot raw request and return a structured result row.",
      "notes": [
        "This is the preferred low-level primitive for one-shot req/rep from SQL.",
        "Use ducknng_request_raw() only when a bare BLOB return is specifically needed."
      ],
      "examples": [
        "SELECT * FROM ducknng_request('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_request_socket",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_request_socket(socket_id, payload, timeout_ms)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, payload BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a raw request through a previously dialed socket handle and return a structured result row.",
      "notes": [
        "This is the preferred low-level primitive when reusing a socket handle.",
        "Use ducknng_request_socket_raw() only when a bare BLOB return is specifically needed."
      ],
      "examples": [
        "SELECT * FROM ducknng_request_socket(1::UBIGINT, from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_get_rpc_manifest",
      "kind": "table",
      "category": "RPC Helper",
      "signature": "ducknng_get_rpc_manifest(url)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, manifest VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Request the RPC manifest and return a structured result row.",
      "notes": [
        "Built on top of the primitive request layer and ducknng RPC envelope."
      ],
      "examples": [
        "SELECT * FROM ducknng_get_rpc_manifest('ipc:///tmp/ducknng_sql0.ipc');"
      ]
    },
    {
      "name": "ducknng_get_rpc_manifest_raw",
      "kind": "scalar",
      "category": "RPC Helper",
      "signature": "ducknng_get_rpc_manifest_raw(url)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Request the RPC manifest and return the raw reply frame as BLOB.",
      "notes": [
        "This is a raw helper: it returns the full reply frame and yields NULL on local request failure.",
        "Use ducknng_decode_frame() to inspect the envelope and payload from SQL."
      ],
      "examples": [
        "SELECT ok, type_name, name, payload_text FROM ducknng_decode_frame(ducknng_get_rpc_manifest_raw('ipc:///tmp/ducknng_sql0.ipc'));"
      ]
    },
    {
      "name": "ducknng_run_rpc",
      "kind": "table",
      "category": "RPC Helper",
      "signature": "ducknng_run_rpc(url, sql)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, rows_changed UBIGINT, statement_type INTEGER, result_type INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute a metadata-oriented RPC call and return a structured result row.",
      "notes": [
        "Built on top of the primitive request layer and the exec RPC method."
      ],
      "examples": [
        "SELECT * FROM ducknng_run_rpc('ipc:///tmp/ducknng_sql0.ipc', 'CREATE TABLE t(i INTEGER)');"
      ]
    },
    {
      "name": "ducknng_run_rpc_raw",
      "kind": "scalar",
      "category": "RPC Helper",
      "signature": "ducknng_run_rpc_raw(url, sql)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute the exec RPC and return the raw reply frame as BLOB.",
      "notes": [
        "This is a raw helper: it returns the full reply frame and yields NULL on local request failure.",
        "Use ducknng_decode_frame() or a payload-specific decoder after inspection."
      ],
      "examples": [
        "SELECT ok, type_name, name FROM ducknng_decode_frame(ducknng_run_rpc_raw('ipc:///tmp/ducknng_sql0.ipc', 'CREATE TABLE t(i INTEGER)'));"
      ]
    },
    {
      "name": "ducknng_query_rpc",
      "kind": "table",
      "category": "RPC Helper",
      "signature": "ducknng_query_rpc(url, sql)",
      "returns": "table",
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute a row-returning RPC query and expose the unary Arrow IPC row reply as a DuckDB table.",
      "notes": [
        "Built on top of the exec RPC method with want_result = true.",
        "This is the current unary row path, not the future session streaming path."
      ],
      "examples": [
        "SELECT * FROM ducknng_query_rpc('ipc:///tmp/ducknng_sql0.ipc', 'SELECT 42 AS answer');"
      ]
    },
    {
      "name": "ducknng_request_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_request_raw(url, payload, timeout_ms)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a one-shot raw request and return the raw reply frame bytes.",
      "notes": [
        "Returns NULL on local request failure instead of throwing.",
        "Use ducknng_decode_frame() to inspect the envelope and textual payload from SQL."
      ],
      "examples": [
        "SELECT hex(ducknng_request_raw('ipc:///tmp/ducknng_sql0.ipc', from_hex('0100'), 1000));"
      ]
    },
    {
      "name": "ducknng_request_socket_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_request_socket_raw(socket_id, payload, timeout_ms)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a raw request through a dialed socket handle and return the raw reply frame bytes.",
      "notes": [
        "Returns NULL on local request failure instead of throwing.",
        "Use ducknng_decode_frame() to inspect the envelope and textual payload from SQL."
      ],
      "examples": [
        "SELECT hex(ducknng_request_socket_raw(1::UBIGINT, from_hex('0100'), 1000));"
      ]
    },
    {
      "name": "ducknng_decode_frame",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_decode_frame(frame)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, version UTINYINT, type UTINYINT, flags UINTEGER, type_name VARCHAR, name VARCHAR, payload BLOB, payload_text VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Decode a raw ducknng frame into envelope fields and extracted payload columns.",
      "notes": [
        "Useful after ducknng_request() or ducknng_request_raw() when inspecting wire replies from SQL.",
        "payload_text is populated only when the payload looks textual."
      ],
      "examples": [
        "SELECT ok, version, type_name, name, payload_text FROM ducknng_decode_frame(ducknng_request_raw('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000));"
      ]
    }
  ]
}

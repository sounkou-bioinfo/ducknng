      "description": "Dial a URL using an opened socket handle.",
      "notes": [
        "Preferred primitive transport verb."
      ],
      "examples": [
        "SELECT ducknng_dial_socket(ducknng_open_socket('req'), 'ipc:///tmp/ducknng_sql0.ipc', 1000);"
      ]
    },

{
  "functions": [
    {
      "name": "ducknng_start_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_start_server(name, listen, contexts, recv_max_bytes, session_idle_ms, tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Start a named ducknng REP listener.",
      "notes": [
        "Transport is selected by the listen URL scheme. Pass tls_config_id = 0 for plaintext URLs such as inproc://, ipc://, or tcp://.",
        "Use ducknng_tls_config_from_files(), ducknng_tls_config_from_pem(), or ducknng_self_signed_tls_config() to create a reusable TLS handle for tls+tcp:// listeners."
      ],
      "examples": [
        "SELECT ducknng_start_server('sql0', 'ipc:///tmp/ducknng_sql0.ipc', 1, 134217728, 300000, 0);"
      ]
    },
    {
      "name": "ducknng_stop_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_stop_server(name)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Stop a named ducknng service.",
      "notes": [],
      "examples": [
        "SELECT ducknng_stop_server('sql0');"
      ]
    },
    {
      "name": "ducknng_list_servers",

{
  "functions": [
    {
      "name": "ducknng_server_start",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_server_start(name, listen, contexts, recv_max_bytes, session_idle_ms, tls_cert_key_file, tls_ca_file, tls_auth_mode)",
      "returns": "BOOLEAN",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Start a named ducknng REP listener for SQL serving on an NNG URL.",
      "notes": [
        "Current TLS arguments are accepted in the signature but any non-NULL TLS configuration is rejected until TLS is implemented."
      ],
      "examples": [
        "SELECT ducknng_server_start('sql0', 'ipc:///tmp/ducknng_sql0.ipc', 1, 134217728, 300000, NULL, NULL, NULL);"
      ]
    },
    {
      "name": "ducknng_server_stop",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_server_stop(name)",
      "returns": "BOOLEAN",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Stop a named ducknng service and tear down its listener and worker thread.",
      "notes": [],
      "examples": [
        "SELECT ducknng_server_stop('sql0');"
      ]
    },
    {
      "name": "ducknng_servers",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_servers()",
      "returns": "TABLE(service_id UBIGINT, name VARCHAR, listen VARCHAR, contexts INTEGER, running BOOLEAN, sessions UBIGINT)",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered ducknng services in the current DuckDB database runtime.",
      "notes": [
        "Returns the current per-database runtime service registry snapshot."
      ],
      "examples": [
        "SELECT * FROM ducknng_servers();"
      ]
    },
    {
      "name": "ducknng_sessions",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_sessions(name)",
      "returns": "TABLE(session_id UBIGINT, batch_no UBIGINT, eos BOOLEAN, last_touch_ms UBIGINT)",
      "aliases": [],
      "since": "0.1.0",
      "implemented": false,
      "description": "List active query sessions for a named ducknng service.",
      "notes": [
        "Depends on query-session support."
      ],
      "examples": [
        "SELECT * FROM ducknng_sessions('sql0');"
      ]
    },
    {
      "name": "ducknng_remote_exec",
      "kind": "scalar",
      "category": "Client / Test Helper",
      "signature": "ducknng_remote_exec(url, sql)",
      "returns": "UBIGINT",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Send an EXEC request over the real wire protocol and return rows changed from the remote reply metadata.",
      "notes": [
        "This helper always sends want_result = false and expects a metadata reply.",
        "Use this for non-row-producing statements or row-changing statements when only rows_changed is needed."
      ],
      "examples": [
        "SELECT ducknng_remote_exec('ipc:///tmp/ducknng_sql0.ipc', 'CREATE TABLE t(i INTEGER)');"
      ]
    },
    {
      "name": "ducknng_remote_manifest",
      "kind": "scalar",
      "category": "Client / Test Helper",
      "signature": "ducknng_remote_manifest(url)",
      "returns": "VARCHAR",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Request the remote ducknng manifest JSON from another ducknng-compatible service.",
      "notes": [
        "Returns the raw manifest JSON payload as VARCHAR."
      ],
      "examples": [
        "SELECT ducknng_remote_manifest('ipc:///tmp/ducknng_sql0.ipc');"
      ]
    },
    {
      "name": "ducknng_socket",
      "kind": "scalar",
      "category": "Client Socket",
      "signature": "ducknng_socket(protocol)",
      "returns": "UBIGINT",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Open a client socket handle for a supported NNG protocol family.",
      "notes": [
        "Currently only req is implemented on the SQL client side."
      ],
      "examples": [
        "SELECT ducknng_socket('req');"
      ]
    },
    {
      "name": "ducknng_dial",
      "kind": "scalar",
      "category": "Client Socket",
      "signature": "ducknng_dial(socket_id, url, timeout_ms)",
      "returns": "BOOLEAN",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Associate a client socket handle with a remote URL using req-style timeout semantics.",
      "notes": [
        "Currently only req client sockets are implemented."
      ],
      "examples": [
        "SELECT ducknng_dial(ducknng_socket('req'), 'ipc:///tmp/ducknng_sql0.ipc', 1000);"
      ]
    },
    {
      "name": "ducknng_close",
      "kind": "scalar",
      "category": "Client Socket",
      "signature": "ducknng_close(socket_id)",
      "returns": "BOOLEAN",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Close a client socket handle and release its runtime state.",
      "notes": [],
      "examples": [
        "SELECT ducknng_close(1);"
      ]
    },
    {
      "name": "ducknng_sockets",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_sockets()",
      "returns": "TABLE(socket_id UBIGINT, protocol VARCHAR, url VARCHAR, open BOOLEAN, connected BOOLEAN, send_timeout_ms INTEGER, recv_timeout_ms INTEGER)",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "List client socket handles registered in the current DuckDB runtime.",
      "notes": [
        "Useful for SQL-native req-style client workflows."
      ],
      "examples": [
        "SELECT * FROM ducknng_sockets();"
      ]
    },
    {
      "name": "ducknng_request",
      "kind": "scalar",
      "category": "Client Socket",
      "signature": "ducknng_request(url, payload, timeout_ms)",
      "returns": "BLOB",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a one-shot req-style raw request and return the raw reply bytes.",
      "notes": [
        "This is the lowest-level SQL helper for the current req/rep client path."
      ],
      "examples": [
        "SELECT ducknng_request('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_request_socket",
      "kind": "scalar",
      "category": "Client Socket",
      "signature": "ducknng_request_socket(socket_id, payload, timeout_ms)",
      "returns": "BLOB",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a req-style raw request using a previously dialed client socket handle and return the raw reply bytes.",
      "notes": [
        "This follows the SQL handle model and keeps the current req transport under one function call per roundtrip."
      ],
      "examples": [
        "SELECT hex(ducknng_request_socket(1, from_hex('01000000000000000000000000000000000000000000'), 1000));"
      ]
    },
    {
      "name": "ducknng_remote",
      "kind": "table",
      "category": "Client / Test Helper",
      "signature": "ducknng_remote(url, sql)",
      "returns": "table",
      "aliases": [],
      "since": "0.1.0",
      "implemented": true,
      "description": "Execute a remote row-returning query over REQ/REP and expose the unary Arrow IPC row reply as a DuckDB table function.",
      "notes": [
        "This is the current unary row-reply client path, not the future session streaming path.",
        "It supports the same currently implemented unary row subset as server-side exec row replies: BOOLEAN, signed/unsigned integers, FLOAT/DOUBLE, VARCHAR, and BLOB."
      ],
      "examples": [
        "SELECT * FROM ducknng_remote('ipc:///tmp/ducknng_sql0.ipc', 'SELECT 42 AS answer');"
      ]
    }
  ]
}

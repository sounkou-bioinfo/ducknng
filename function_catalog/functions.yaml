{
  "functions": [
    {
      "name": "ducknng_start_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_start_server(name, listen, contexts, recv_max_bytes, session_idle_ms, tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Start a named ducknng REP listener.",
      "notes": [
        "Transport is selected by the listen URL scheme. Pass tls_config_id = 0 for plaintext URLs such as inproc://, ipc://, or tcp://.",
        "Use ducknng_tls_config_from_files(), ducknng_tls_config_from_pem(), or ducknng_self_signed_tls_config() to create a reusable TLS handle for tls+tcp:// listeners."
      ],
      "examples": [
        "SELECT ducknng_start_server('sql0', 'ipc:///tmp/ducknng_sql0.ipc', 1, 134217728, 300000, 0);"
      ]
    },
    {
      "name": "ducknng_stop_server",
      "kind": "scalar",
      "category": "Service Control",
      "signature": "ducknng_stop_server(name)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Stop a named ducknng service.",
      "notes": [],
      "examples": [
        "SELECT ducknng_stop_server('sql0');"
      ]
    },
    {
      "name": "ducknng_list_servers",
      "kind": "table",
      "category": "Introspection",
      "signature": "ducknng_list_servers()",
      "returns": "TABLE(service_id UBIGINT, name VARCHAR, listen VARCHAR, contexts INTEGER, running BOOLEAN, sessions UBIGINT)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered ducknng services.",
      "notes": [],
      "examples": [
        "SELECT * FROM ducknng_list_servers();"
      ]
    },
    {
      "name": "ducknng_register_exec_method",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_register_exec_method()",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register the built-in exec RPC method explicitly.",
      "notes": [
        "exec is not registered by default. Call this deliberately before exposing SQL execution over RPC."
      ],
      "examples": [
        "SELECT ducknng_register_exec_method();"
      ]
    },
    {
      "name": "ducknng_unregister_method",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_unregister_method(name)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Unregister a method from the runtime registry.",
      "notes": [
        "The built-in manifest method cannot be unregistered."
      ],
      "examples": [
        "SELECT ducknng_unregister_method('exec');"
      ]
    },
    {
      "name": "ducknng_unregister_family",
      "kind": "scalar",
      "category": "Method Registry",
      "signature": "ducknng_unregister_family(family)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Unregister all methods in a family and return the number removed.",
      "notes": [
        "The built-in control family cannot be unregistered."
      ],
      "examples": [
        "SELECT ducknng_unregister_family('sql');"
      ]
    },
    {
      "name": "ducknng_list_methods",
      "kind": "table",
      "category": "Method Registry",
      "signature": "ducknng_list_methods()",
      "returns": "TABLE(name VARCHAR, family VARCHAR, summary VARCHAR, transport_pattern VARCHAR, request_payload_format VARCHAR, response_payload_format VARCHAR, response_mode VARCHAR, request_schema_json VARCHAR, response_schema_json VARCHAR, requires_auth BOOLEAN, disabled BOOLEAN)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List the currently registered RPC methods in the runtime registry.",
      "notes": [
        "Use this to verify whether exec has been explicitly enabled."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_methods();"
      ]
    },
    {
      "name": "ducknng_open_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_open_socket(protocol)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Open a client socket handle for a supported NNG protocol.",
      "notes": [
        "Supported protocols now follow the nanonext-facing model: bus, pair, pair0, pair1, poly, push, pull, pub, sub, req, rep, surveyor, and respondent.",
        "pair is the nanonext-compatible alias for pair0, and poly opens pair1 in polyamorous mode.",
        "request-oriented helpers such as ducknng_request_socket_raw() still require a req socket."
      ],
      "examples": [
        "SELECT ducknng_open_socket('req');",
        "SELECT ducknng_open_socket('pair');",
        "SELECT ducknng_open_socket('surveyor');"
      ]
    },
    {
      "name": "ducknng_dial_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_dial_socket(socket_id, url, timeout_ms)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Dial a URL using an opened socket handle.",
      "notes": [
        "Transport is still selected by the URL scheme.",
        "This is the generic dial verb for the supported socket protocols."
      ],
      "examples": [
        "SELECT ducknng_dial_socket(ducknng_open_socket('req'), 'ipc:///tmp/ducknng_sql0.ipc', 1000);"
      ]
    },
    {
      "name": "ducknng_listen_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_listen_socket(socket_id, url, recv_max_bytes, tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Bind a socket handle to a listen URL and start its NNG listener.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext URLs or a registered TLS handle for tls+tcp:// listeners.",
        "Use this for the generic socket surface rather than the RPC service lifecycle surface."
      ],
      "examples": [
        "SELECT ducknng_listen_socket(ducknng_open_socket('pair'), 'ipc:///tmp/ducknng_pair.ipc', 134217728, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_close_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_close_socket(socket_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Close a client socket handle.",
      "notes": [],
      "examples": [
        "SELECT ducknng_close_socket(1);"
      ]
    },
    {
      "name": "ducknng_send_socket_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_send_socket_raw(socket_id, frame, timeout_ms)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Send one raw frame through an active socket handle.",
      "notes": [
        "This is the raw socket-level send primitive modeled on nanonext send(..., mode = 'raw').",
        "A TRUE result means the send operation completed successfully at the NNG socket layer."
      ],
      "examples": [
        "SELECT ducknng_send_socket_raw(1::UBIGINT, from_hex('68656c6c6f'), 1000);"
      ]
    },
    {
      "name": "ducknng_recv_socket_raw",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_recv_socket_raw(socket_id, timeout_ms)",
      "returns": "BLOB",
      "since": "0.1.0",
      "implemented": true,
      "description": "Receive one raw frame from an active socket handle.",
      "notes": [
        "This is the raw socket-level receive primitive modeled on nanonext recv(..., mode = 'raw')."
      ],
      "examples": [
        "SELECT hex(ducknng_recv_socket_raw(1::UBIGINT, 1000));"
      ]
    },
    {
      "name": "ducknng_subscribe_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_subscribe_socket(socket_id, topic)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a raw topic prefix on a sub socket.",
      "notes": [
        "Pass from_hex('') to subscribe to all topics.",
        "This is only valid for sockets opened with protocol = 'sub'."
      ],
      "examples": [
        "SELECT ducknng_subscribe_socket(1::UBIGINT, from_hex(''));"
      ]
    },
    {
      "name": "ducknng_unsubscribe_socket",
      "kind": "scalar",
      "category": "Primitive Transport",
      "signature": "ducknng_unsubscribe_socket(socket_id, topic)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Remove a raw topic prefix from a sub socket.",
      "notes": [
        "Pass from_hex('') to remove the all-topics subscription.",
        "This is only valid for sockets opened with protocol = 'sub'."
      ],
      "examples": [
        "SELECT ducknng_unsubscribe_socket(1::UBIGINT, from_hex(''));"
      ]
    },
    {
      "name": "ducknng_list_sockets",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_list_sockets()",
      "returns": "TABLE(socket_id UBIGINT, protocol VARCHAR, url VARCHAR, open BOOLEAN, connected BOOLEAN, listening BOOLEAN, send_timeout_ms INTEGER, recv_timeout_ms INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List client socket handles in the runtime.",
      "notes": [
        "url reports the current dial URL or listen URL tracked on the socket handle.",
        "Primitive transport introspection."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_sockets();"
      ]
    },
    {
      "name": "ducknng_list_tls_configs",
      "kind": "table",
      "category": "Transport Security",
      "signature": "ducknng_list_tls_configs()",
      "returns": "TABLE(tls_config_id UBIGINT, source VARCHAR, enabled BOOLEAN, has_cert_key_file BOOLEAN, has_ca_file BOOLEAN, has_cert_pem BOOLEAN, has_key_pem BOOLEAN, has_ca_pem BOOLEAN, has_password BOOLEAN, auth_mode INTEGER)",
      "since": "0.1.0",
      "implemented": true,
      "description": "List registered TLS config handles and the kinds of material they contain.",
      "notes": [
        "This is runtime introspection only and does not expose the sensitive PEM content itself."
      ],
      "examples": [
        "SELECT * FROM ducknng_list_tls_configs();"
      ]
    },
    {
      "name": "ducknng_drop_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_drop_tls_config(tls_config_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Remove a registered TLS config handle from the runtime.",
      "notes": [],
      "examples": [
        "SELECT ducknng_drop_tls_config(1);"
      ]
    },
    {
      "name": "ducknng_self_signed_tls_config",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_self_signed_tls_config(common_name, valid_days, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Generate a self-signed development certificate and register it as a TLS config handle.",
      "notes": [
        "Intended for development and local testing utilities rather than production PKI.",
        "Uses the openssl command-line tool available in the runtime environment."
      ],
      "examples": [
        "SELECT ducknng_self_signed_tls_config('127.0.0.1', 365, 1);"
      ]
    },
    {
      "name": "ducknng_tls_config_from_pem",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_tls_config_from_pem(cert_pem, key_pem, ca_pem, password, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a TLS config handle from in-memory PEM material.",
      "notes": [
        "Stores PEM material in the runtime and returns a reusable config id.",
        "Can be used with tls+tcp listeners and the one-shot raw request path."
      ],
      "examples": [
        "SELECT ducknng_tls_config_from_pem('-----BEGIN CERTIFICATE-----\n...','-----BEGIN PRIVATE KEY-----\n...', '-----BEGIN CERTIFICATE-----\n...', NULL, 1);"
      ]
    },
    {
      "name": "ducknng_tls_config_from_files",
      "kind": "scalar",
      "category": "Transport Security",
      "signature": "ducknng_tls_config_from_files(cert_key_file, ca_file, password, auth_mode)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Register a TLS config handle from file-backed certificate material.",
      "notes": [
        "Stores TLS material references in the runtime and returns a reusable config id.",
        "Can be used with tls+tcp listeners and the one-shot raw request path."
      ],
      "examples": [
        "SELECT ducknng_tls_config_from_files('/tmp/server.pem', '/tmp/ca.pem', NULL, 1);"
      ]
    },
    {
      "name": "ducknng_request",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_request(url, payload, timeout_ms, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, payload BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a one-shot raw request and return a structured result row.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "This is the preferred low-level primitive for one-shot req/rep from SQL.",
        "Use ducknng_request_raw() only when a bare BLOB return is specifically needed."
      ],
      "examples": [
        "SELECT * FROM ducknng_request('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_request_socket",
      "kind": "table",
      "category": "Primitive Transport",
      "signature": "ducknng_request_socket(socket_id, payload, timeout_ms)",
      "returns": "TABLE(ok BOOLEAN, error VARCHAR, payload BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform a raw request through a previously dialed socket handle and return a structured result row.",
      "notes": [
        "This is the preferred low-level primitive when reusing a socket handle.",
        "Use ducknng_request_socket_raw() only when a bare BLOB return is specifically needed."
      ],
      "examples": [
        "SELECT * FROM ducknng_request_socket(1::UBIGINT, from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_ncurl",
      "kind": "table",
      "category": "HTTP Transport",
      "signature": "ducknng_ncurl(url, method, headers_json, body, timeout_ms, tls_config_id)",
      "returns": "TABLE(ok BOOLEAN, status INTEGER, error VARCHAR, headers_json VARCHAR, body BLOB, body_text VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Perform one HTTP or HTTPS request and return an in-band result row.",
      "notes": [
        "This is the low-level HTTP/HTTPS client primitive for future ducknng transport-adapter work.",
        "ok means the HTTP transport operation completed and a response was received; status carries the HTTP status code and may still be 4xx or 5xx.",
        "headers_json uses the canonical array-of-objects form such as [{\"name\":\"Content-Type\",\"value\":\"application/json\"}].",
        "body contains the raw response body bytes and body_text is a best-effort text decoding when the payload looks textual."
      ],
      "examples": [
        "SELECT * FROM ducknng_ncurl('http://127.0.0.1:8080/_ducknng', 'POST', '[{\"name\":\"Content-Type\",\"value\":\"application/vnd.ducknng.frame\"}]', from_hex('01000000000000000000000000000000000000000000'), 2000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_request_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_request_raw_aio(url, frame, timeout_ms, tls_config_id)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one raw req/rep roundtrip asynchronously and return a future-like aio handle id.",
      "notes": [
        "Pass tls_config_id = 0::UBIGINT for plaintext or a registered TLS handle for tls+tcp://.",
        "The returned handle represents one pending request operation backed by NNG aio state.",
        "timeout_ms bounds the lifetime of that pending operation; it is separate from the later wait_ms argument passed to ducknng_aio_collect().",
        "Use ducknng_aio_status() to inspect whether the send phase has completed successfully.",
        "Use ducknng_aio_collect() to retrieve the full reply frame later."
      ],
      "examples": [
        "SELECT ducknng_request_raw_aio('ipc:///tmp/ducknng_sql0.ipc', from_hex('01000000000000000000000000000000000000000000'), 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_get_rpc_manifest_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_get_rpc_manifest_raw_aio(url, timeout_ms, tls_config_id)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one asynchronous manifest RPC request and return an aio handle id for the raw reply frame.",
      "notes": [
        "This is a raw unary RPC aio wrapper layered on top of the ordinary request/reply aio substrate rather than a separate job system.",
        "Collect the aio later and decode the returned frame with ducknng_decode_frame().",
        "timeout_ms bounds the launched request operation itself; it does not control how long a later ducknng_aio_collect() call waits."
      ],
      "examples": [
        "SELECT ducknng_get_rpc_manifest_raw_aio('ipc:///tmp/ducknng_sql0.ipc', 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_run_rpc_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_run_rpc_raw_aio(url, sql, timeout_ms, tls_config_id)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one asynchronous metadata-only exec RPC request and return an aio handle id for the raw reply frame.",
      "notes": [
        "This is the raw async companion to ducknng_run_rpc_raw().",
        "Collect the aio later and decode the returned frame with ducknng_decode_frame().",
        "timeout_ms bounds the launched request operation itself; it does not control how long a later ducknng_aio_collect() call waits."
      ],
      "examples": [
        "SELECT ducknng_run_rpc_raw_aio('ipc:///tmp/ducknng_sql0.ipc', 'CREATE TABLE t(i INTEGER)', 1000, 0::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_request_socket_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_request_socket_raw_aio(socket_id, frame, timeout_ms)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one raw req/rep roundtrip asynchronously on an existing req socket handle and return an aio handle id.",
      "notes": [
        "The socket must already be opened, dialed, connected, and use protocol = req.",
        "Use ducknng_aio_collect() to retrieve the full reply frame later."
      ],
      "examples": [
        "SELECT ducknng_request_socket_raw_aio(1::UBIGINT, from_hex('01000000000000000000000000000000000000000000'), 1000);"
      ]
    },
    {
      "name": "ducknng_send_socket_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_send_socket_raw_aio(socket_id, frame, timeout_ms)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one raw socket send asynchronously and return an aio handle id.",
      "notes": [
        "This is the nanonext-like send_aio analogue for the raw SQL socket surface.",
        "A successful collected result has ok = TRUE and frame = NULL because send-only operations do not produce reply frames."
      ],
      "examples": [
        "SELECT ducknng_send_socket_raw_aio(1::UBIGINT, from_hex('68656c6c6f'), 1000);"
      ]
    },
    {
      "name": "ducknng_recv_socket_raw_aio",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_recv_socket_raw_aio(socket_id, timeout_ms)",
      "returns": "UBIGINT",
      "since": "0.1.0",
      "implemented": true,
      "description": "Launch one raw socket receive asynchronously and return an aio handle id.",
      "notes": [
        "This is the nanonext-like recv_aio analogue for the raw SQL socket surface.",
        "Collect the aio later to retrieve the received raw frame."
      ],
      "examples": [
        "SELECT ducknng_recv_socket_raw_aio(1::UBIGINT, 1000);"
      ]
    },
    {
      "name": "ducknng_aio_ready",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_aio_ready(aio_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Return whether an aio handle has reached a terminal state.",
      "notes": [
        "Returns FALSE for unknown handles and for pending operations.",
        "A collected handle remains ready until it is dropped."
      ],
      "examples": [
        "SELECT ducknng_aio_ready(1::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_aio_status",
      "kind": "table",
      "category": "Async I/O",
      "signature": "ducknng_aio_status(aio_id)",
      "returns": "TABLE(aio_id UBIGINT, exists BOOLEAN, kind VARCHAR, state VARCHAR, phase VARCHAR, terminal BOOLEAN, send_done BOOLEAN, send_ok BOOLEAN, recv_done BOOLEAN, recv_ok BOOLEAN, has_reply_frame BOOLEAN, error VARCHAR)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Inspect the current or terminal status of one aio handle, including send-phase and recv-phase completion.",
      "notes": [
        "Use this to answer whether a send-only or request aio has completed its send phase successfully.",
        "Unknown handles return exists = FALSE and NULL metadata fields.",
        "This is exposed as a SQL macro over an internal volatile scalar so dynamic aio ids work under the stable DuckDB C API."
      ],
      "examples": [
        "SELECT * FROM ducknng_aio_status(1::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_aio_collect",
      "kind": "table",
      "category": "Async I/O",
      "signature": "ducknng_aio_collect(aio_ids, wait_ms)",
      "returns": "TABLE(aio_id UBIGINT, ok BOOLEAN, error VARCHAR, frame BLOB)",
      "since": "0.1.0",
      "implemented": true,
      "description": "Wait for any requested aio handles to finish and return one row per newly collected terminal result.",
      "notes": [
        "Pass a LIST<UBIGINT> of aio handle ids, for example list_value(aio1, aio2).",
        "Dynamic list expressions are supported through the SQL macro wrapper, including scalar subqueries that produce one list value.",
        "wait_ms controls only how long this collect call waits for already-launched aio handles; it is separate from the timeout_ms used when those handles were launched.",
        "wait_ms = 0 performs a pure poll.",
        "For send-only airos, frame is NULL on success. For recv/request airos, frame contains the collected raw frame when present."
      ],
      "examples": [
        "SELECT * FROM ducknng_aio_collect(list_value(1::UBIGINT, 2::UBIGINT), 1000);"
      ]
    },
    {
      "name": "ducknng_aio_cancel",
      "kind": "scalar",
      "category": "Async I/O",
      "signature": "ducknng_aio_cancel(aio_id)",
      "returns": "BOOLEAN",
      "since": "0.1.0",
      "implemented": true,
      "description": "Request cancellation of a pending aio handle.",
      "notes": [
        "Returns FALSE for unknown handles and for handles that are no longer pending."
      ],
      "examples": [
        "SELECT ducknng_aio_cancel(1::UBIGINT);"
      ]
    },
    {
      "name": "ducknng_aio_drop",
      "kind": "scalar",
      "category": "Async I/O",
